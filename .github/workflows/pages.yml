# Deploy the static site (index.html + static/) to GitHub Pages.
#
# The dynamic Flask app is for local dev; public users hit a prebuilt
# static bundle. Everything the browser needs is already committed:
# index.html, static/data/competitions.json, static/data/<comp>/*.json.
#
# To enable:
#   gh api -X POST /repos/<owner>/<repo>/pages -f build_type=workflow
#   (or Settings → Pages → Source: "GitHub Actions")

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'static/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stage site into _site/
        run: |
          mkdir -p _site
          cp index.html _site/
          cp -r static _site/
          # Jekyll default pipeline would eat files that start with _ —
          # we don't have any, but the marker is cheap insurance.
          touch _site/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
